{{- if .Values.valkey.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tarot-core.fullname" . }}-valkey
  labels:
    {{- include "tarot-core.valkey.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: valkey
      protocol: TCP
      name: valkey
  selector:
    {{- include "tarot-core.valkey.selectorLabels" . | nindent 4 }}
{{- end }}
