name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Login to Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Compute version
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}:${{ steps.meta.outputs.version }}
            ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}:latest
          cache-from: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/cache:main
          cache-to: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/cache:main,mode=max
          platforms: linux/amd64
          provenance: false
          sbom: false

  helm:
    name: Package Helm Chart
    needs: [docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
      - name: Compute version
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Package chart
        run: |
          helm package ./deploy/chart \
            --version ${{ steps.meta.outputs.version }} \
            --app-version ${{ steps.meta.outputs.version }}
      - uses: actions/upload-artifact@v7
        with:
          name: helm-chart
          path: "*.tgz"
