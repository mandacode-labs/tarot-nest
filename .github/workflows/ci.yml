name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  test:
    name: Unit Tests
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "npm"
      - run: npm ci
      - run: npm run test -- --coverage
      - uses: codecov/codecov-action@v7
        if: always()

  test-e2e:
    name: E2E Tests
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "npm"
      - run: npm ci
      - run: npm run test:e2e

  build:
    name: Build
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "npm"
      - run: npm ci
      - run: npm run build

  docker:
    name: Docker Build
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Login to Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and cache
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          tags: tarot-server:ci
          cache-from: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/cache:main
          cache-to: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/cache:main,mode=max

  kind:
    name: Kind Deploy Test
    needs: [docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
      - uses: helm/kind-action@v1.14.0
        with:
          install_only: true
      - name: Load Docker image into kind
        run: |
          kind load docker-image tarot-server:ci --name ci
      - name: Deploy Helm chart
        run: |
          helm upgrade --install tarot-core ./deploy/chart \
            --set app.image.repository=tarot-server \
            --set app.image.tag=ci \
            --set app.image.pullPolicy=IfNotPresent \
            --set app.image.pullSecrets=[] \
            --set valkey.enabled=true \
            --set config.cache.enabled=true \
            --wait --timeout 5m
      - name: Health check
        run: |
          kubectl port-forward svc/tarot-core 3000:3000 &
          sleep 5
          curl -sf http://localhost:3000/health
